    <!-- Spline Setup integration -->
    <script type="module">
        import { Application } from 'https://esm.sh/@splinetool/runtime';

        const canvas = document.getElementById('canvas3d');
        const app = new Application(canvas);
        
        // Setup Loading Animation
        const loader = document.getElementById('loader');
        const percentageEl = document.getElementById('loader-percentage');
        const progressFill = document.getElementById('loader-progress-fill');
        const loaderText = document.getElementById('loader-text');
        const loaderPill = document.getElementById('loader-pill');
        const percentageContainer = document.getElementById('loader-percentage-container');
        
        let progress = 0;
        
        // Simulate progress intervals for canvas downloading heavily
        const interval = setInterval(() => {
            if (progress < 96) {
                progress += Math.floor(Math.random() * 6) + 1;
                if (progress > 96) progress = 96;
                percentageEl.innerText = progress + '%';
                progressFill.style.width = progress + '%';
            }
        }, 120);

        app.load('https://prod.spline.design/j5O4R-PI9KxP5jKS/scene.splinecode')
            .then(() => {
                clearInterval(interval);
                progress = 100;
                percentageEl.innerText = '100%';
                progressFill.style.width = '100%';
                
                // Show WELCOME
                setTimeout(() => {
                    percentageContainer.style.opacity = '0';
                    loaderText.style.opacity = '0';
                    
                    setTimeout(() => {
                        loaderPill.classList.remove('w-[260px]', 'md:w-[320px]', 'justify-between');
                        loaderPill.classList.add('justify-center', 'w-[200px]', 'shadow-[0_0_50px_rgba(194,164,255,0.4)]', 'border-[#c2a4ff]/50');
                        loaderText.innerText = 'WELCOME';
                        percentageContainer.style.display = 'none';
                        loaderText.style.opacity = '1';
                        
                        // Fade entire loader out permanently
                        setTimeout(() => {
                            loader.style.opacity = '0';
                            setTimeout(() => loader.style.display = 'none', 1000);
                        }, 1200);
                    }, 500); // structural morph wait
                }, 500); // 100% pause wait
            })
            .catch(error => {
                clearInterval(interval);
                console.error("Failed to load 3D scene:", error);
                loaderPill.innerHTML = '<span class="text-red-500 font-bold uppercase text-xs">Error Loading Canvas</span>';
            });
    </script>
    
    <!-- Text Animation Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bgText = document.getElementById('bg-text');
            const fgText = document.getElementById('fg-text');
            
            let bgCurrent = 'Architect';
            let fgCurrent = 'DEVELOPER';

            function initSpans(element, text) {
                element.innerHTML = '';
                const chars = Array.from(text);
                chars.forEach((char) => {
                    const span = document.createElement('span');
                    span.innerText = char === ' ' ? '\u00A0' : char;
                    span.style.display = 'inline-block';
                    span.style.opacity = '1';
                    span.style.transform = 'translateY(0)';
                    element.appendChild(span);
                });
            }

            function swapTextStaggered(element, currentText, newText) {
                const oldSpans = Array.from(element.children);
                const newChars = Array.from(newText);
                
                // Animate old characters out
                oldSpans.forEach((span, i) => {
                    span.style.transition = 'opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
                    setTimeout(() => {
                        span.style.opacity = '0';
                        span.style.transform = 'translateY(15px)';
                    }, i * 60);
                });

                const maxOutDelay = (oldSpans.length * 60) + 400;
                
                setTimeout(() => {
                    element.innerHTML = '';
                    const newSpans = [];
                    newChars.forEach((char) => {
                        const span = document.createElement('span');
                        span.innerText = char === ' ' ? '\u00A0' : char;
                        span.style.display = 'inline-block';
                        span.style.transition = 'opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
                        span.style.opacity = '0';
                        span.style.transform = 'translateY(-15px)';
                        
                        element.appendChild(span);
                        newSpans.push(span);
                    });

                    // Trigger reflow
                    void element.offsetWidth;

                    newSpans.forEach((span, i) => {
                        setTimeout(() => {
                            span.style.opacity = '1';
                            span.style.transform = 'translateY(0)';
                        }, i * 60);
                    });
                }, maxOutDelay);
            }

            // Initialize with spans
            initSpans(bgText, bgCurrent);
            initSpans(fgText, fgCurrent);

            setInterval(() => {
                const nextBg = bgCurrent === 'Architect' ? 'DEVELOPER' : 'Architect';
                const nextFg = fgCurrent === 'DEVELOPER' ? 'Architect' : 'DEVELOPER';

                swapTextStaggered(bgText, bgCurrent, nextBg);
                swapTextStaggered(fgText, fgCurrent, nextFg);

                bgCurrent = nextBg;
                fgCurrent = nextFg;
            }, 4500); 
        });
    </script>

            });
            socialContainer.addEventListener('mouseleave', () => {
